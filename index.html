<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bugzy Business Pro</title>
    <link rel="icon" type="image/png" href="/icon-192.png">
    
    <!-- PWA Support -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bugzy Pro">
    <link rel="apple-touch-icon" href="/icon-192.png">

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('PWA Service Worker registered');
              
              // Force the SW to take control immediately
              if (reg.installing) {
                const sw = reg.installing || reg.waiting;
                sw.onstatechange = () => {
                  if (sw.state === 'installed' && navigator.serviceWorker.controller) {
                    console.log('New content available.');
                  }
                };
              }
            })
            .catch(err => console.error('PWA Service Worker failed', err));
        });

        // Ensure the page is controlled on first load
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          console.log('Service Worker took control');
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
